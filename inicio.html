<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WapMarket — Inicio</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
  <style>
    body{
      font-family: 'Inter', sans-serif;
      background:#f8fafc;
      margin:0; padding:0;
      color:#0f172a;
    }
    header{
      display:flex; justify-content:space-between; align-items:center;
      padding:16px 20px; background:#fff; border-bottom:1px solid #e2e8f0;
      position:sticky; top:0; z-index:50;
    }
    .logo{ font-weight:700; font-size:1.2rem; }
    .top-buttons{ display:flex; gap:12px; }
    .icon-btn{
      background:#2563eb; border:none; color:#fff;
      border-radius:8px; padding:8px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .2s ease;
    }
    .icon-btn:hover{ background:#1e40af; }
    .icon-btn svg{ width:20px; height:20px; }

    /* Negocios cards */
    .negocio-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .negocio-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }
    .negocio-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .negocio-info h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: #0f172a;
    }
    .negocio-info span {
      font-size: .85rem;
      color: #475569;
    }
    .ver-btn{
      background:transparent; border:none; font-size:1.2rem; cursor:pointer;
      color:#2563eb;
    }

    /* Secciones */
    section{ padding:20px; }
    h2{ font-size:1.2rem; margin-bottom:12px; }

    /* Filtros */
    .filtros{
      background:#fff; border:1px solid #e2e8f0;
      border-radius:12px; padding:16px;
    }
    .filtros label{ font-size:.85rem; color:#475569; display:block; margin:8px 0 4px; }
    .filtros input, .filtros select{
      width:100%; padding:8px; border-radius:6px; border:1px solid #cbd5e1;
      font-family:inherit;
    }

    /* Retractil en móvil */
    @media(max-width:768px){
      .negocios, .filtros { display:none; }
      .toggle-btn{
        background:#2563eb; color:#fff; border:none;
        padding:10px 14px; border-radius:8px;
        font-size:0.9rem; font-weight:600;
        margin:10px; display:inline-block;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">WapMarket</div>
    <div class="top-buttons">
      <!-- Botón Carrito -->
      <button class="icon-btn" id="cartBtn" aria-label="Carrito">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M6 6h15l-1.5 9H7.5L6 6Z" stroke-width="1.6"/>
          <circle cx="9" cy="20" r="1.6"/>
          <circle cx="18" cy="20" r="1.6"/>
        </svg>
      </button>
      <!-- Botón Entrar -->
      <button class="icon-btn" id="loginBtn" aria-label="Entrar">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" stroke-width="1.6"/>
          <path d="M10 17l5-5-5-5M15 12H3" stroke-width="1.6"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Botones retráctiles solo móviles -->
  <button class="toggle-btn" onclick="toggleSection('negocios')">Ver Negocios</button>
  <button class="toggle-btn" onclick="toggleSection('filtros')">Ver Filtros</button>

  <!-- Negocios -->
  <section class="negocios">
    <h2>Negocios</h2>
    <div class="negocio-card">
      <div class="negocio-info">
        <h3>Martínez Hermanos</h3>
        <span>2 productos</span>
      </div>
      <button class="ver-btn">→</button>
    </div>
    <div class="negocio-card">
      <div class="negocio-info">
        <h3>Abacería Eyang</h3>
        <span>2 productos</span>
      </div>
      <button class="ver-btn">→</button>
    </div>
  </section>

  <!-- Filtros -->
  <section class="filtros">
    <h2>Filtros</h2>
    <label for="categoria">Categoría</label>
    <select id="categoria">
      <option value="">Selecciona categoría</option>
      <option value="alimentacion">Alimentación</option>
      <option value="tecnologia">Tecnología</option>
    </select>

    <label for="min">Precio mínimo</label>
    <input id="min" type="number" value="0"/>

    <label for="max">Precio máximo</label>
    <input id="max" type="number" value="100000"/>
  </section>

  <script>
    function toggleSection(id){
      const el = document.querySelector('.'+id);
      if(el.style.display === 'block'){
        el.style.display = 'none';
      } else {
        el.style.display = 'block';
      }
    }
  </script>
</body>
</html>
