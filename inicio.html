<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WapMarket — Conecta negocios y clientes</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <!-- Topbar -->
  <header class="topbar">
    <div class="brand">WapMarket</div>

    <div class="search">
      <input id="searchInput" type="text" placeholder="Buscar productos..." />
      <button id="searchBtn" class="btn-primary">Buscar</button>
    </div>

    <nav class="nav" id="userSection" aria-label="Usuario">
  <button id="userGreetingBtn" class="icon-btn" aria-label="Usuario" title="Usuario">
    <!-- Icono minimalista de usuario -->
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-5 0-9 2.5-9 5.5A1.5 1.5 0 0 0 4.5 21h15A1.5 1.5 0 0 0 21 19.5C21 16.5 17 14 12 14Z"/>
    </svg>
  </button>
</nav>

<!-- Modal saludo -->
<div id="greetingModal" class="modal hidden" aria-hidden="true">
  <div class="modal-content" role="dialog" aria-labelledby="greetingTitle">
    <div class="modal-header">
      <h3 id="greetingTitle">Bienvenido</h3>
      <button id="closeGreeting" class="icon-btn sm" aria-label="Cerrar">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12 19 6.4 17.6 5 12 10.6Z"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <p id="userGreetingText">Hola, usuario</p>
    </div>
  </div>
</div>


    <button id="cartBtn" class="icon-btn" aria-label="Carrito" title="Carrito">
      <!-- Icono carrito -->
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M7 4h-2a1 1 0 1 0 0 2h1.28l1.6 8.02A2 2 0 0 0 9.83 16h7.37a2 2 0 0 0 1.96-1.6l1.3-6.5A1 1 0 0 0 20.5 6h-12l-.3-1.5A1 1 0 0 0 7 4Zm1.5 16a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Zm9 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/>
      </svg>
      <span id="cartCount" class="badge">0</span>
    </button>
  </header>

  <div class="main-layout">
    <!-- Sidebar con paneles retractiles -->
    <aside class="sidebar">
      <!-- NEGOCIOS -->
      <details class="panel" id="bizPanel" open>
        <summary class="panel-summary">
          <span class="panel-title">Negocios</span>
          <span class="chev" aria-hidden="true"></span>
        </summary>

        <section class="businesses" id="businessesSection">
          <div class="business-actions">
            <div class="business-search">
              <input id="businessSearch" type="text" placeholder="Buscar negocio..." />
            </div>
          </div>

          <!-- Lista de negocios (app.js la rellena) -->
          <div class="business-list" id="businessesList"></div>
        </section>
      </details>

      <!-- FILTROS -->
      <details class="panel" id="filterPanel" open>
        <summary class="panel-summary">
          <span class="panel-title">Filtros</span>
          <span class="chev" aria-hidden="true"></span>
        </summary>

        <section class="filters">
          <label>Categoría
            <select id="categoryFilter">
              <option value="">Todas las categorías</option>
            </select>
          </label>
          <label>Precio mínimo
            <input type="number" min="0" value="0" id="minPriceFilter" />
          </label>
          <label>Precio máximo
            <input type="number" min="0" value="100000" id="maxPriceFilter" />
          </label>
        </section>
      </details>
      <!-- PUBLICIDAD -->
<div class="card publicidad" data-card></div>

<style>
  .card.publicidad {
    border-radius: 0; /* elimina esquinas redondeadas */
    width: 100%;
    max-width: 320px;
    margin: 1rem auto;
    position: relative;
    height: 420px;
    border: 2px solid #cfd6df;
    box-shadow: 0 10px 30px rgba(0,0,0,.18);
    overflow: hidden;
    background: #000;
  }
  .card.publicidad img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity .9s ease, transform .5s ease;
  }
  .card.publicidad img.active {
    opacity: 1;
  }
  .card.publicidad:hover img {
    transform: scale(1.04);
  }
</style>
    </aside>

    <!-- Productos -->
    <main class="products-area">
      <div class="products-header">
        <h2 id="productsTitle">Productos disponibles</h2>
      </div>
      <div class="products-list" id="productsList">
        <!-- Los productos se cargan dinámicamente -->
      </div>
    </main>
  </div>

  <!-- Drawer Carrito -->
  <div id="cartDrawer" class="drawer hidden" aria-hidden="true">
    <div class="drawer-content" role="dialog" aria-labelledby="cartTitle">
      <div class="drawer-header">
        <h3 id="cartTitle">Tu carrito</h3>
        <button id="closeCart" class="icon-btn sm" aria-label="Cerrar">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12 19 6.4 17.6 5 12 10.6Z"/></svg>
        </button>
      </div>
      <div id="cartItems"></div>
      <div class="drawer-footer">
        <div class="totals">
          <div>Subtotal: <strong id="subtotalXAF">0</strong> XAF</div>
        </div>
        <button id="checkoutOpen" class="btn-primary wide">Proceder al pedido</button>
      </div>
    </div>
  </div>

  <!-- Modal Checkout -->
  <div id="checkoutModal" class="modal hidden" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-labelledby="checkoutTitle">
      <div class="modal-header">
        <h3 id="checkoutTitle">Finalizar pedido</h3>
        <button id="closeCheckout" class="icon-btn sm" aria-label="Cerrar">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12 19 6.4 17.6 5 12 10.6Z"/></svg>
        </button>
      </div>
      <form id="checkoutForm">
        <div class="grid">
          <label>Nombre (si no has iniciado sesión)
            <input name="guest_name" placeholder="Tu nombre" />
          </label>
          <label>Teléfono
            <input name="guest_phone" placeholder="+240..." />
          </label>
        </div>
        <div class="grid">
          <label>Tipo de entrega
            <select name="fulfillment_type" id="fulfillmentType">
              <option value="pickup">Recoger en tienda</option>
              <option value="delivery">Entrega a domicilio (+2000 XAF)</option>
            </select>
          </label>
          <label>Dirección (si es entrega)
            <input name="address" placeholder="Barrio / calle / referencia" />
          </label>
        </div>
        <div class="summary">
          <div>Subtotal: <span id="coSubtotal">0</span> XAF</div>
          <div>Envío: <span id="coDelivery">0</span> XAF</div>
          <div class="total">Total: <strong id="coTotal">0</strong> XAF</div>
        </div>
        <button type="submit" class="btn-primary wide">Confirmar pedido</button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div>© 2025 WapMarket — Guinea-Ecuatorial (GQ-Bata)</div>
    <div class="legal-links">
      <a href="terminos.html">Términos</a>
      <a href="informacion.html">Información</a>
    </div>
  </footer>

  <!-- Tu lógica -->
  <script src="app.js"></script>
  <script>
    // Colapsar paneles por defecto en móvil
    document.addEventListener('DOMContentLoaded', () => {
      const mobile = window.matchMedia('(max-width: 700px)').matches;
      const panels = document.querySelectorAll('.panel');
      if (mobile) panels.forEach(p => p.removeAttribute('open'));

      // Rotación de chevron
      panels.forEach(p => {
        p.addEventListener('toggle', () => {
          const chev = p.querySelector('.chev');
          if (!chev) return;
          chev.classList.toggle('open', p.open);
        });
      });

      // Botón "Todos": notificar a la app que se limpien filtros de negocio
      const resetBtn = document.getElementById('resetBusinessFilter');
      if (resetBtn) {
        resetBtn.addEventListener('click', () => {
          window.dispatchEvent(new CustomEvent('resetBusinessFilter'));
        });
      }
    });
  </script>
  
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const pubCard = document.querySelector(".card.publicidad");

    // Lista de imágenes en tu carpeta assets/pub/
    const pubImages = [
      "display_large_2x-ip16.webp",
      "Captura de pantalla 2025-07-07 a la(s) 19.24.34.png",
      "Captura de pantalla 2025-07-07 a la(s) 19.02.16.png",
      "c5c1f82a-9517-4699-8d2f-cd9de4ed6c78.jpg",
      "earbuds.jpeg",   // renombra tu archivo largo a este nombre en assets/pub/
      "banner3.jpg"
    ];

    // Limpiar imágenes que estén puestas en el HTML
    pubCard.innerHTML = "";

    // Crear dinámicamente las etiquetas <img>
    pubImages.forEach((file, i) => {
      const img = document.createElement("img");
      img.src = `assets/pub/${file}`;
      img.alt = `Publicidad ${i+1}`;
      if (i === 0) img.classList.add("active");
      pubCard.appendChild(img);
    });

    // ----- Slider automático -----
    function startImageSlider(card){
      const images = card.querySelectorAll("img");
      if(!images.length) return;
      let i = 0;
      images.forEach((img, idx)=> img.style.opacity = idx===0 ? "1" : "0");
      const tick = () => {
        images[i].classList.remove("active");
        images[i].style.opacity = "0";
        i = (i + 1) % images.length;
        images[i].classList.add("active");
        images[i].style.opacity = "1";
      };
      setInterval(tick, 30000);
    }

    startImageSlider(pubCard);
  });
</script>



  <!-- jsPDF (si ya lo usas) -->

</body>
</html>
