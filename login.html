<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso — WapMarket</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f3ec;
      --fg: #0f172a;
      --fg-soft: #475569;
      --accent: #2563eb;
      --accent-2: #0ea5e9;
      --glass-bg: rgba(255,255,255,.55);
      --glass-brd: rgba(255,255,255,.65);
      --line: #e2e8f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% -10%, rgba(255,255,255,.6), transparent 60%),
                  radial-gradient(1000px 700px at 90% -20%, rgba(255,255,255,.35), transparent 60%),
                  var(--bg);
      display: flex; flex-direction: column;
      min-height: 100vh;
      color: var(--fg);
    }
    main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .auth-card {
      background: var(--glass-bg);
      backdrop-filter: saturate(1.35) blur(14px);
      border: 1px solid var(--glass-brd);
      border-radius: 18px;
      padding: 30px;
      width: 100%; max-width: 420px;
      box-shadow: 0 10px 30px rgba(17,24,39,.12), inset 0 1px 0 rgba(255,255,255,.4);
    }
    .tabs {
      display: flex; justify-content: space-around;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      font-weight: 600;
      color: var(--fg-soft);
      cursor: pointer;
      transition: color .2s, border .2s;
    }
    .tab.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }
    form {
      display: flex; flex-direction: column; gap: 14px;
      text-align: left;
    }
    label {
      font-size: 0.85rem; font-weight: 600; color: var(--fg-soft);
    }
    input {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #fff;
      font-size: 0.95rem;
      transition: border .2s ease, box-shadow .2s ease;
      width: 100%;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.25);
    }
    button {
      border: none;
      border-radius: 30px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      transition: all .3s ease;
    }
    button:hover {
      background: linear-gradient(135deg, #38bdf8, #1d4ed8);
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }
    .small-text {
      font-size: 0.75rem;
      color: var(--fg-soft);
      margin-top: 12px;
      text-align: center;
    }
    .small-text a { color: var(--accent); text-decoration: none; }
    .small-text a:hover { text-decoration: underline; }
    footer {
      background:#f2ede6;
      border-top: 1px solid var(--line);
      padding: 14px;
      font: 400 .8rem/1.5 Inter, system-ui;
      color: var(--fg-soft);
      text-align: center;
    }
    @media (max-width: 480px) {
      .auth-card { margin: 0 10px; padding: 25px; }
      button { font-size: .95rem; }
    }
  </style>
</head>
<body>
  <main>
    <div class="auth-card">
      <!-- Tabs -->
      <div class="tabs">
        <div id="tab-login" class="tab active">Iniciar Sesión</div>
        <div id="tab-signup" class="tab">Crear Cuenta</div>
      </div>

      <!-- Formulario Login -->
      <form id="loginForm">
        <label>Email</label>
        <input name="email" type="email" required />
        <label>Contraseña</label>
        <input name="password" type="password" required />
        <button type="submit">Entrar</button>
      </form>

      <!-- Formulario Signup -->
      <form id="signupForm" style="display:none;">
        <label>Nombre</label>
        <input name="name" required />
        <label>Teléfono</label>
        <input name="phone" />
        <label>Email</label>
        <input name="email" type="email" required />
        <label>Contraseña</label>
        <input name="password" type="password" required />
        <button type="submit">Registrarme</button>
      </form>

      <div class="small-text">
        Al continuar, aceptas nuestras <a href="terminos.html">Condiciones</a> y <a href="informacion.html">Privacidad</a>.
      </div>
    </div>
  </main>

  <footer>
    <span>© WapMarket</span>
  </footer>

  <!-- ⚡ Mantiene las funciones originales -->
  <script src="app.js"></script>
  <script>
    // Cambiar entre login y signup
    const tabLogin = document.getElementById("tab-login");
    const tabSignup = document.getElementById("tab-signup");
    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");

    tabLogin.addEventListener("click", () => {
      tabLogin.classList.add("active");
      tabSignup.classList.remove("active");
      loginForm.style.display = "flex";
      signupForm.style.display = "none";
    });

    tabSignup.addEventListener("click", () => {
      tabSignup.classList.add("active");
      tabLogin.classList.remove("active");
      loginForm.style.display = "none";
      signupForm.style.display = "flex";
    });
  </script>
  <script>
  // === LOGIN ===
  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const formData = Object.fromEntries(new FormData(loginForm));
    try {
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData),
      });
      const data = await res.json();

      if (!res.ok) {
        alert(data.error || "Error al iniciar sesión");
        return;
      }

      // Guardamos datos en localStorage
      localStorage.setItem("userId", data.user._id);
      localStorage.setItem("role", data.user.role);

      if (data.user.role === "seller") {
        localStorage.setItem("sellerId", data.user._id);
        window.location.href = "seller.html";
      } else if (data.user.role === "admin") {
        window.location.href = "admin.html";
      } else {
        // Cliente
        localStorage.setItem("sellerId", ""); // por si acaso
        // Crear WapCard si no existe
        await fetch(`/create-wapcard/${data.user._id}`, { method: "POST" });
        window.location.href = "inicio.html";
      }
    } catch (err) {
      console.error("Error login:", err);
      alert("Error de conexión con el servidor");
    }
  });

  // === SIGNUP ===
  signupForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const formData = Object.fromEntries(new FormData(signupForm));
    try {
      const res = await fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData),
      });
      const data = await res.json();

      if (!res.ok) {
        alert(data.error || "Error en el registro");
        return;
      }

      // Guardamos datos en localStorage
      localStorage.setItem("userId", data.user._id);
      localStorage.setItem("role", data.user.role);

      if (data.user.role === "seller") {
        localStorage.setItem("sellerId", data.user._id);
        window.location.href = "seller.html";
      } else if (data.user.role === "admin") {
        window.location.href = "admin.html";
      } else {
        // Cliente normal
        await fetch(`/create-wapcard/${data.user._id}`, { method: "POST" });
        window.location.href = "inicio.html";
      }
    } catch (err) {
      console.error("Error signup:", err);
      alert("Error de conexión con el servidor");
    }
  });
</script>

</body>
</html>
