<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - WapMarket</title>
</head>
<body>
  <h2>Iniciar Sesión</h2>

  <!-- ✅ Formulario SIN action ni method -->
  <form id="loginForm">
    <input type="email" id="loginEmail" placeholder="Email" required />
    <input type="password" id="loginPassword" placeholder="Contraseña" required />
    <button type="submit">Entrar</button>
  </form>

  <script>
    const API_BASE = "https://backend-wapmarket-production.up.railway.app"; 
    // ⚠️ Cámbialo si tu backend tiene otro subdominio real

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault(); // ✅ evita que el form se envíe como GET en la URL

      const email = document.getElementById("loginEmail").value;
      const pass = document.getElementById("loginPassword").value;

      try {
        const res = await fetch(`${API_BASE}/api/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password: pass })
        });

        const text = await res.text(); // leemos texto primero
        let data;
        try {
          data = JSON.parse(text); // intentamos parsear JSON
        } catch {
          throw new Error("Respuesta inesperada del servidor: " + text.slice(0, 100));
        }

        if (!res.ok) {
          throw new Error(data.error || "Error en login");
        }

        // ✅ Guardar sesión
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        // ✅ Redirección según rol
        if (data.user.role === "admin") {
          window.location.href = "admin.html";
        } else if (data.user.role === "seller") {
          window.location.href = "seller.html";
        } else {
          window.location.href = "inicio.html";
        }

      } catch (err) {
        console.error("Error en login:", err);
        alert("Error: " + err.message);
      }
    });
  </script>
</body>
</html>
