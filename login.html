<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — WapMarket</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f3ec;
      --fg: #0f172a;
      --fg-soft: #475569;
      --card: #ffffff;
      --line: #e2e8f0;
      --accent: #2563eb;
      --accent-2: #0ea5e9;
    }
    * {margin:0;padding:0;box-sizing:border-box;}
    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }
    main {
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:32px;
      width:100%;
      max-width:400px;
      box-shadow:0 10px 24px rgba(17,24,39,.08);
      text-align:center;
    }
    h1 {
      font-size:1.8rem;
      margin-bottom:20px;
      font-weight:800;
    }
    .form-group {
      text-align:left;
      margin-bottom:16px;
    }
    label {
      display:block;
      font-weight:600;
      margin-bottom:6px;
      font-size:0.9rem;
    }
    input {
      width:100%;
      padding:10px 14px;
      border:1px solid var(--line);
      border-radius:10px;
      font-size:1rem;
    }
    input:focus {
      outline:none;
      border-color: var(--accent);
      box-shadow:0 0 0 3px rgba(37,99,235,.2);
    }
    button {
      width:100%;
      padding:12px;
      border:none;
      border-radius:12px;
      font-weight:600;
      font-size:1rem;
      color:#fff;
      background:linear-gradient(135deg, var(--accent-2), var(--accent));
      cursor:pointer;
      transition:all .3s ease;
    }
    button:hover {
      background:linear-gradient(135deg, #38bdf8, #1d4ed8);
      transform:translateY(-2px);
    }
    .error {
      margin-top:12px;
      font-size:0.9rem;
      color:#dc2626;
    }
    footer {
      background:#f2ede6;
      border-top:1px solid var(--line);
      padding:14px;
      font:400 .8rem/1.5 Inter, system-ui;
      color:var(--fg-soft);
      text-align:center;
    }
    .legal-links a{
      color:var(--accent);
      text-decoration:none;
      margin:0 6px;
    }
    .legal-links a:hover{ text-decoration:underline; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>Inicia sesión</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Correo electrónico</label>
          <input type="email" id="loginEmail" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" required>
        </div>
        <button type="submit">Continuar</button>
        <div id="errorMsg" class="error" style="display:none;"></div>
      </form>
    </div>
  </main>

  <footer>
    <div>WapMarket | Wap Tech &amp; Software development | todos los derechos reservados | Guinea-Ecuatorial (GQ) | 2025</div>
    <div class="legal-links" style="margin-top:6px;">
      <a href="terminos.html">Términos</a> |
      <a href="informacion.html">Información</a>
    </div>
  </footer>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async e => {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      const errorBox = document.getElementById("errorMsg");
      errorBox.style.display = "none";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        if (!res.ok) throw new Error("Credenciales inválidas");
        const data = await res.json();

        // Guardar token en localStorage (si tu backend devuelve uno)
        if (data.token) localStorage.setItem("auth_token", data.token);

        // Redirigir a inicio
        window.location.href = "inicio.html";
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
      }
    });
  </script>
</body>
</html>
