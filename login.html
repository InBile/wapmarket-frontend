<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso — WapMarket</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="auth-body">
  <div class="auth-card">
    <!-- Iniciar sesión -->
    <div id="loginBox">
      <h2>Iniciar sesión</h2>
      <form id="loginForm">
        <label for="loginEmail">Correo electrónico</label>
        <input id="loginEmail" name="email" type="email" required>
        
        <label for="loginPassword">Contraseña</label>
        <input id="loginPassword" name="password" type="password" required>
        
        <button type="submit" class="btn-yellow">Continuar</button>
      </form>
      <div class="small-text">
        Al continuar, aceptas nuestras <a href="terminos.html">Condiciones de uso</a> y <a href="informacion.html">Aviso de privacidad</a>.
      </div>
      <div class="toggle-link">
        ¿Eres nuevo aquí? <a href="#" id="showSignup">Crea tu cuenta</a>
      </div>
    </div>

    <!-- Crear cuenta -->
    <div id="signupBox" class="hidden">
      <h2>Crear cuenta</h2>
      <form id="signupForm">
        <label for="signupName">Nombre</label>
        <input id="signupName" name="name" required>
        
        <label for="signupPhone">Teléfono</label>
        <input id="signupPhone" name="phone">
        
        <label for="signupEmail">Correo electrónico</label>
        <input id="signupEmail" name="email" type="email" required>
        
        <label for="signupPassword">Contraseña</label>
        <input id="signupPassword" name="password" type="password" required>
        
        <button type="submit" class="btn-yellow">Registrarme</button>
      </form>
      <div class="small-text">
        Al crear una cuenta, aceptas nuestras <a href="terminos.html">Condiciones</a> y <a href="informacion.html">Política de privacidad</a>.
      </div>
      <div class="toggle-link">
        ¿Ya tienes cuenta? <a href="#" id="showLogin">Inicia sesión</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Toggle entre login y signup
    document.getElementById("showSignup").addEventListener("click", e => {
      e.preventDefault();
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("signupBox").classList.remove("hidden");
    });
    document.getElementById("showLogin").addEventListener("click", e => {
      e.preventDefault();
      document.getElementById("signupBox").classList.add("hidden");
      document.getElementById("loginBox").classList.remove("hidden");
    });
  </script>
  <footer class="footer">

  </footer>
</body>
</html>
