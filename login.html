<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso — WapMarket</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f3ec;
      --fg: #0f172a;
      --fg-soft: #475569;
      --accent: #2563eb;
      --accent-2: #0ea5e9;
      --glass-bg: rgba(255,255,255,.55);
      --glass-brd: rgba(255,255,255,.65);
      --line: #e2e8f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% -10%, rgba(255,255,255,.6), transparent 60%),
                  radial-gradient(1000px 700px at 90% -20%, rgba(255,255,255,.35), transparent 60%),
                  var(--bg);
      display: flex; flex-direction: column;
      min-height: 100vh;
      color: var(--fg);
    }
    main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .auth-card {
      background: var(--glass-bg);
      backdrop-filter: saturate(1.35) blur(14px);
      -webkit-backdrop-filter: saturate(1.35) blur(14px);
      border: 1px solid var(--glass-brd);
      border-radius: 18px;
      padding: 36px 30px;
      width: 100%; max-width: 420px;
      box-shadow: 0 10px 30px rgba(17,24,39,.12), inset 0 1px 0 rgba(255,255,255,.4);
      text-align: center;
    }
    h2 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 18px;
    }
    form {
      display: flex; flex-direction: column; gap: 14px;
      margin-bottom: 18px;
      text-align: left;
    }
    label {
      font-size: 0.85rem; font-weight: 600; color: var(--fg-soft);
    }
    input {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #fff;
      font-size: 0.95rem;
      transition: border .2s ease, box-shadow .2s ease;
      width: 100%;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.25);
    }
    button {
      border: none;
      border-radius: 30px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      transition: all .3s ease;
    }
    button:hover {
      background: linear-gradient(135deg, #38bdf8, #1d4ed8);
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }
    .small-text {
      font-size: 0.75rem;
      color: var(--fg-soft);
      margin-top: 4px;
      line-height: 1.4;
    }
    .small-text a { color: var(--accent); text-decoration: none; }
    .small-text a:hover { text-decoration: underline; }
    footer {
      background:#f2ede6;
      border-top: 1px solid var(--line);
      padding: 14px;
      font: 400 .8rem/1.5 Inter, system-ui;
      color: var(--fg-soft);
      text-align: center;
    }
    @media (max-width: 480px) {
      .auth-card {
        margin: 0 10px;
        padding: 28px 22px;
      }
      h2 { font-size: 1.4rem; }
      button { font-size: .95rem; }
    }
  </style>
</head>
<body>
  <main>
    <div class="auth-card">
      <h2>Iniciar sesión</h2>
      <form id="loginForm">
        <label>Email</label>
        <input name="email" type="email" required />
        
        <label>Contraseña</label>
        <input name="password" type="password" required />
        
        <button type="submit">Entrar</button>
      </form>

      <h2 style="margin-top:20px;">Crear cuenta</h2>
      <form id="signupForm">
        <label>Nombre</label>
        <input name="name" required />
        
        <label>Teléfono</label>
        <input name="phone" />
        
        <label>Email</label>
        <input name="email" type="email" required />
        
        <label>Contraseña</label>
        <input name="password" type="password" required />
        
        <button type="submit">Registrarme</button>
      </form>

      <div class="small-text">
        Al continuar, aceptas nuestras <a href="terminos.html">Condiciones</a> y <a href="informacion.html">Privacidad</a>.
      </div>
    </div>
  </main>

  <footer>
    <span>© WapMarket</span>
  </footer>

  <!-- ⚡ Mantiene las funciones desde login.html -->
  <script src="app.js"></script>
</body>
</html>
