<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso — WapMarket</title>
  <link rel="stylesheet" href="styles.css"/>
  <!-- Fuente + estilos visuales (solo apariencia) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #f7f3ec;
      --fg: #0f172a;
      --fg-soft:#475569;
      --line:#e2e8f0;
      --card:#ffffff;
      --glass: rgba(255,255,255,.55);
      --glass-brd: rgba(255,255,255,.65);
      --accent:#2563eb;
      --accent-2:#0ea5e9;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--fg);
      background:
        radial-gradient(1200px 800px at 20% -10%, rgba(255,255,255,.6), transparent 60%),
        radial-gradient(1000px 700px at 90% -20%, rgba(255,255,255,.35), transparent 60%),
        var(--bg);
      display:flex;
      flex-direction:column;
    }

    /* Topbar elegante */
    .topbar{
      position:sticky; top:0; z-index:10;
      backdrop-filter:saturate(1.25) blur(10px);
      -webkit-backdrop-filter:saturate(1.25) blur(10px);
      background:linear-gradient(180deg, rgba(255,255,255,.65), rgba(255,255,255,.35));
      border-bottom:1px solid var(--glass-brd);
      padding:12px 16px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .brand{font-weight:800; letter-spacing:.2px}
    .nav a{
      color:var(--fg-soft); text-decoration:none; font-weight:600;
      padding:8px 10px; border-radius:10px;
    }
    .nav a:hover{background:rgba(0,0,0,.04); color:var(--fg)}

    /* Contenedor de auth */
    .container.auth{
      flex:1;
      width:100%;
      max-width:1100px;
      margin:0 auto;
      padding:24px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      align-items:center;
    }

    /* Tarjetas */
    .container.auth > section{
      background: var(--glass);
      border:1px solid var(--glass-brd);
      border-radius:18px;
      box-shadow:0 10px 30px rgba(17,24,39,.12), inset 0 1px 0 rgba(255,255,255,.4);
      backdrop-filter:saturate(1.25) blur(14px);
      -webkit-backdrop-filter:saturate(1.25) blur(14px);
      padding:28px 24px;
    }
    .container.auth > section h2{
      margin:0 0 14px 0;
      font-size:1.45rem;
      font-weight:800;
      letter-spacing:.2px;
    }

    /* Formularios */
    form{display:flex; flex-direction:column; gap:14px; margin-top:4px}
    form label{font-size:.9rem; font-weight:600; color:var(--fg-soft); display:block}
    form label input{
      margin-top:6px;
      width:100%;
      padding:12px;
      font-size:0.96rem;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      transition:border .2s ease, box-shadow .2s ease, transform .05s ease;
    }
    form label input:focus{
      outline:none;
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(37,99,235,.25);
    }
    form button{
      margin-top:6px;
      border:none; cursor:pointer; color:#fff; font-weight:700;
      padding:12px 14px; border-radius:30px; font-size:1rem;
      background:linear-gradient(135deg, var(--accent-2), var(--accent));
      transition:transform .12s ease, box-shadow .25s ease, filter .2s ease;
    }
    form button:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 18px rgba(37,99,235,.25);
      filter:saturate(1.05);
    }
    form button:active{transform:translateY(0)}

    /* Footer */
    .footer{
      text-align:center;
      padding:12px 16px;
      border-top:1px solid var(--line);
      background:#f2ede6;
      color:var(--fg-soft);
      font-size:.85rem;
    }

    /* Responsivo */
    @media (max-width: 980px){
      .container.auth{grid-template-columns:1fr; max-width:680px}
    }
    @media (max-width: 480px){
      .container.auth{padding:16px}
      .container.auth > section{padding:22px 18px}
      .container.auth > section h2{font-size:1.25rem}
      form button{font-size:.95rem}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">WapMarket</div>
    <nav class="nav">
      <a href="index.html">Inicio</a>
    </nav>
  </header>

  <main class="container auth">
    <section>
      <h2>Iniciar sesión</h2>
      <form id="loginForm">
        <label>Email <input name="email" type="email" required /></label>
        <label>Contraseña <input name="password" type="password" required /></label>
        <button type="submit">Entrar</button>
      </form>
    </section>

    <section>
      <h2>Crear cuenta (cliente)</h2>
      <form id="signupForm">
        <label>Nombre <input name="name" required /></label>
        <label>Teléfono <input name="phone" /></label>
        <label>Email <input name="email" type="email" required /></label>
        <label>Contraseña <input name="password" type="password" required /></label>
        <button type="submit">Registrarme</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <span>© WapMarket</span>
  </footer>

  <!-- Se mantiene tu lógica tal cual -->
  <script src="app.js"></script>
</body>
</html>
