<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin — WapCard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="topbar">
    <div class="brand">WapMarket — Admin</div>
    <nav class="nav">
      <a href="inicio.html" class="btn-primary sm">Inicio</a>
    </nav>
  </header>

  <div class="main-layout">
    <aside class="sidebar">
      <details class="panel" open>
        <summary class="panel-summary">
          <span class="panel-title">Gestión</span>
          <span class="chev"></span>
        </summary>
        <ul class="panel-list">
          <li><a href="admin.html">Recargas</a></li>
          <li><a href="seller.html">Saldos Vendedores</a></li>
        </ul>
      </details>
    </aside>

    <main class="products-area">
      <div class="products-header">
        <h2>Recargar WapCard</h2>
      </div>

      <div class="card" style="padding:1rem; max-width:500px;">
        <label>ID de Usuario</label>
        <input type="text" id="rechargeUserId" placeholder="Ej: 64a5d..." />

        <label>Monto a recargar</label>
        <input type="number" id="rechargeAmount" placeholder="Monto en XAF" />

        <button id="rechargeBtn" class="btn-primary wide" style="margin-top:1rem;">
          Recargar
        </button>
      </div>
    </main>
  </div>

  <script src="index (15).js"></script>
  <script>
    document.getElementById("rechargeBtn").addEventListener("click", async () => {
      const userId = document.getElementById("rechargeUserId").value;
      const amount = Number(document.getElementById("rechargeAmount").value);

      if (!userId || !amount) return alert("Completa los campos");

      const res = await fetch("/admin/recharge", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId, amount })
      });
      const data = await res.json();
      alert(data.message || "Recarga completada");
    });
  </script>
</body>
</html>
