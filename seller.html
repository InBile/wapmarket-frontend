<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Vendedor — WapCard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="topbar">
    <div class="brand">WapMarket — Vendedor</div>
    <nav class="nav">
      <a href="inicio.html" class="btn-primary sm">Inicio</a>
    </nav>
  </header>

  <div class="main-layout">
    <aside class="sidebar">
      <details class="panel" open>
        <summary class="panel-summary">
          <span class="panel-title">Mi cuenta</span>
          <span class="chev"></span>
        </summary>
        <ul class="panel-list">
          <li><a href="seller.html">WapCard</a></li>
        </ul>
      </details>
    </aside>

    <main class="products-area">
      <div class="products-header">
        <h2>Mi WapCard</h2>
      </div>

      <div class="card" style="padding:1rem; max-width:500px;">
        <p><strong>Saldo actual:</strong> <span id="sellerBalance">--</span> XAF</p>

        <label>Monto a retirar</label>
        <input type="number" id="withdrawAmount" placeholder="Monto en XAF" />

        <button id="withdrawBtn" class="btn-primary wide" style="margin-top:1rem;">
          Retirar Fondos
        </button>
      </div>
    </main>
  </div>

  <script src="index (15).js"></script>
  <script>
    const sellerId = localStorage.getItem("sellerId"); 

    async function loadSellerBalance() {
      try {
        const res = await fetch(`/card/${sellerId}`);
        const data = await res.json();
        document.getElementById("sellerBalance").innerText = data.balance;
      } catch (err) {
        console.error("Error cargando saldo:", err);
      }
    }

    document.getElementById("withdrawBtn").addEventListener("click", async () => {
      const amount = Number(document.getElementById("withdrawAmount").value);
      if (!amount) return alert("Ingresa un monto");

      const res = await fetch("/seller/withdraw", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sellerId, amount })
      });
      const data = await res.json();
      alert(data.message || "Retiro procesado");
      loadSellerBalance();
    });

    loadSellerBalance();
  </script>
</body>
</html>
