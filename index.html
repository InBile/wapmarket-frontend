<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WapMarket — Landing Minimal Pro</title>
  <meta name="color-scheme" content="light" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root{
      --bg: #f7f3ec;
      --fg: #0f172a;
      --fg-soft:#475569;
      --card:#ffffff;
      --line:#e2e8f0;
      --accent:#2563eb;
      --accent-2:#0ea5e9;
      --glass-bg: rgba(255,255,255,.45);
      --glass-brd: rgba(255,255,255,.65);
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Futura", system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
      text-align: center;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    .shell{ width: min(1100px, 92vw); margin: 0 auto; }
    header.hero{ padding: 64px 0 40px; position: relative; }

    .glassbar{
      display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 10px 12px; border-radius: 16px;
      backdrop-filter: saturate(1.35) blur(12px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-brd);
      box-shadow: 0 10px 30px rgba(17,24,39,.12), inset 0 1px 0 rgba(255,255,255,.35);
    }
    .gb-chip{ padding: 8px 14px; border-radius: 999px; font: 600 13px/1 Inter, sans-serif; cursor: pointer; }

    .title{ font-family: "Futura", sans-serif; font-weight: 800; font-size: clamp(2.2rem, 6vw, 3.6rem); margin-top: 18px; }
    .subtitle{ font: 400 1rem/1.6 Inter, sans-serif; color: var(--fg-soft); }
    .buttons{ margin-top: 22px; display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }

    .button {
      width: 140px; height: 45px; display:flex; align-items:center; justify-content:center; gap:8px;
      border-radius: 30px; font-weight: 600; font-size: 1rem; border: none; cursor: pointer; padding: 0 16px;
      box-shadow: 4px 4px 12px rgba(0,0,0,0.15); transition: all .3s ease; color: #ffffff;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
    }
    .svgIcon { height: 22px; width: 22px; fill: currentColor; }

    .qr-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 24px rgba(17,24,39,.08);
      display: inline-block;
      margin-top: 40px;
    }
    .qr-card img { width: 150px; height: 150px; }
    .qr-card p { margin-top: 10px; font-size: 0.9rem; color: var(--fg-soft); }

    .logo-container { margin-top: 30px; }
    .logo-container img { width: 110px; height: auto; }

    footer{ background:#f2ede6; border-top: 1px solid var(--line); padding: 14px; font: 400 .8rem/1.5 Inter, sans-serif; color: var(--fg-soft); }

    /* Responsive ajustes */
    @media (max-width: 768px) {
      header.hero { padding: 40px 0 28px; }
      .title { font-size: clamp(1.8rem, 8vw, 2.6rem); }
      .subtitle { font-size: 0.95rem; }
      .qr-card { margin-top: 28px; padding: 16px; }
      .qr-card img { width: 120px; height: 120px; }
      .logo-container img { width: 90px; }
    }
    @media (max-width: 480px) {
      .buttons { flex-direction: column; gap: 10px; }
      .button { width: 100%; max-width: 220px; }
      .qr-card img { width: 100px; height: 100px; }
      .logo-container img { width: 80px; }
    }
  </style>
</head>
<body>
  <header class="hero shell">
    <div class="glassbar">
      <button class="gb-chip" data-target="#destacados">Destacados</button>
      <button class="gb-chip" data-target="#detalles">Detalles</button>
      <button class="gb-chip" data-target="#pasos">Cómo empezar</button>
      <button class="gb-chip" data-target="#faq">FAQ</button>
    </div>

    <h1 class="title">WapMarket</h1>
    <p class="subtitle">Sueña alto, conecta tu negocio con más clientes</p>
    <p class="subtitle">El nuevo mundo GQ</p>

    <div class="buttons">
      <button class="button" onclick="window.location.href='inicio.html'">
        <svg class="svgIcon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zm50.7-186.9L162.4 380.6c-19.4 7.5-38.5-11.6-31-31l55.5-144.3c3.3-8.5 9.9-15.1 18.4-18.4l144.3-55.5c19.4-7.5 38.5 11.6 31 31L325.1 306.7c-3.2 8.5-9.9 15.1-18.4 18.4zM288 256a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z"/>
        </svg>
        <span>Explore</span>
      </button>
      <button class="button" onclick="window.location.href='login.html'">Entrar</button>
    </div>

    <!-- QR Card -->
    <div class="qr-card">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wa.me/240555218661" alt="QR WhatsApp" />
      <p>Escanea para chatear por WhatsApp</p>
    </div>

    <!-- Logo -->
    <div class="logo-container">
      <img src="coomo.png" alt="Logo WapMarket" />
    </div>
  </header>

  <footer>
    <div>WapMarket | Wap Tech &amp; Software development | CEO Román Salvador Ona Bile | todos los derechos reservados | Guinea-Ecuatorial (GQ-Bata) | 2025</div>
    <div class="legal-links" style="margin-top:6px;">
      <a href="terminos.html">Términos</a> |
      <a href="informacion.html">Información</a>
    </div>
  </footer>
</body>
</html>
